{
  # The process node. This is used to tell cacti what technology to use when
  # estimating power, performance and area numbers.
  "tech_nm": 45,

  # The operating voltage.
  "voltage": 1.1,

  # String to add in front of every metal layer number for the layer name.
  "metalPrefix": "metal",

  # The pin width for signal pins.
  "pinWidth_nm": 70,

  # The minimum pin pitch for signal pins (all pins will have a pitch that is a
  # multuple of this pitch. The first pin will be a multiple of this pitch from
  # the bottom edge of the macro too.
  "pinPitch_nm": 140,

  # Optional: snap the width and height of the sram to a multiple value.
  "snapWidth_nm":  190,
  "snapHeight_nm": 1400,

  # Flips the pin orientations. Non-fliped assumes metal1 is vertical therefore
  # supply pins on metal4 will be horizontal and signal pins will also be on
  # metal4. If set to true, supply pins on metal4 will be vertical and signal
  # pins will be on metal3.
  "flipPins": true,

  # List of SRAM configurations.
  #
  # Required keys:
  #   name      - unique macro name (string)
  #   width     - data word width in bits (integer)
  #   depth     - number of words / address space (integer)
  #   banks     - number of internal banks for Cacti modelling (integer, usually 1)
  #
  # Optional keys:
  #   port_type - "1rw"  (default) : one combined read/write port
  #               "1r1w"           : one exclusive read port + one exclusive write port
  #
  #   rdw_mode  - collision policy when r_addr == w_addr in the same cycle (1r1w only)
  #               "R" (default) : read-first  – rd_out returns the OLD value
  #               "W"           : write-first – rd_out returns the value being written
  #
  #   out_reg   - output register mode
  #               true  (default) : rd_out is registered (clocked, 1-cycle latency)
  #                                 Liberty uses a rising-edge clock-to-Q timing arc
  #               false           : rd_out is combinational (transparent to array state)
  #                                 Liberty uses a combinational timing arc from the
  #                                 read address / chip-enable pin
  #
  "srams": [
    # --- 1rw examples ---
    {"name": "sram_32x32_1rw",         "width":  32, "depth":   32, "banks": 1},
    {"name": "sram_8x512_1rw",         "width":   8, "depth":  512, "banks": 1},
    # 1rw with combinational (async) read output
    {"name": "sram_32x32_1rw_async",   "width":  32, "depth":   32, "banks": 1,
     "out_reg": false},

    # --- 1r1w examples ---
    # Default: read-first collision policy, registered output
    {"name": "sram_128x128_1r1w",      "width": 128, "depth":  128, "banks": 1,
     "port_type": "1r1w"},
    # Write-first collision policy (matches Vortex VX_dp_ram RDW_MODE="W")
    {"name": "sram_128x128_1r1w_wf",   "width": 128, "depth":  128, "banks": 1,
     "port_type": "1r1w", "rdw_mode": "W"},
    # Combinational read output (matches Vortex VX_dp_ram OUT_REG=0 use-cases)
    {"name": "sram_128x128_1r1w_async","width": 128, "depth":  128, "banks": 1,
     "port_type": "1r1w", "rdw_mode": "W", "out_reg": false}
  ]
}
