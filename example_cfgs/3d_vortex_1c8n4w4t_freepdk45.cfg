{
  # =============================================================================
  # Vortex GPU (config 1c8n4w4t: 8 cores, 1 MiB L2) — 3D SRAM hard-macro set
  # =============================================================================
  # Same macro set as 2d_vortex_1c8n4w4t_freepdk45.cfg but modeled as 3D-stacked
  # SRAMs using CACTI-M3D.
  #
  # 3D configuration:
  #   num_dies  = 2          : two stacked die tiers
  #   partition = "bit"      : BLP (bit-line partitioning — splits width across dies)
  #
  # Generated with:
  #   ./scripts/run_3d.py example_cfgs/3d_vortex_1c8n4w4t_freepdk45.cfg
  #
  # Per VX_socket_top (single core block)
  #   sram_1024x32_1rw   : 4  (local memory banks)
  #   sram_64x128_1r1w   : 4  (GPR / register-file banks)
  #   sram_64x24_1r1w    : 8  (I$ + D$ tag arrays)
  #   sram_64x512_1rw    : 8  (I$ + D$ data arrays)
  #   Subtotal per core  : 24 macros
  #
  # Top-level L2 (8 banks × 8 ways, 1 MiB)
  #   sram_256x512_1rw  : 64 (L2 data arrays)
  #   sram_256x24_1r1w  : 64 (L2 tag arrays)
  #   Subtotal L2        : 128 macros
  #
  # Full SoC (1c8n4w4t)
  #   Core-block SRAMs    : 8 × 24 = 192
  #   L2 SRAMs            : 128
  #   Grand total         : 320 instances (6 unique cell types)
  # =============================================================================

  "tech_nm": 45,
  "voltage": 1.1,
  "metalPrefix": "metal",
  "pinWidth_nm": 70,
  "pinPitch_nm": 140,
  "snapWidth_nm":  190,
  "snapHeight_nm": 1400,
  "flipPins": true,

  # 3D-stacking parameters (used by run_3d.py / Memory3D)
  "num_dies": 2,
  "partition": "bit",

  "srams": [
    # ---- Per VX_socket_top ----
    {"name": "sram_1024x32_1rw",   "width":  32, "depth": 1024, "banks": 1, "port_type": "1rw"},
    {"name": "sram_64x128_1r1w",  "width": 128, "depth":   64, "banks": 1, "port_type": "1r1w"},
    {"name": "sram_64x24_1r1w",   "width":  24, "depth":   64, "banks": 1, "port_type": "1r1w"},
    {"name": "sram_64x512_1rw",   "width": 512, "depth":   64, "banks": 1, "port_type": "1rw"},
    # ---- L2 (top) ----
    {"name": "sram_256x512_1rw",  "width": 512, "depth":  256, "banks": 1, "port_type": "1rw"},
    {"name": "sram_256x24_1r1w",  "width":  24, "depth":  256, "banks": 1, "port_type": "1r1w"}
  ]
}
